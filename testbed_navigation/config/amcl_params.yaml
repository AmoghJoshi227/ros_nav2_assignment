amcl:
  ros__parameters:

    min_particles: 500
    max_particles: 2000

    kld_err: 0.05
    kld_z: 0.99

    update_min_d: 0.20
    update_min_a: 0.30

    resample_interval: 1

    robot_model_type: "nav2_amcl::DifferentialMotionModel"

    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2

    laser_model_type: "likelihood_field"

    laser_max_range: 12.0
    laser_min_range: -1.0

    max_beams: 60

    laser_likelihood_max_dist: 2.0
    laser_sigma_hit: 0.2

    z_hit: 0.5
    z_rand: 0.5

    base_frame_id: "base_footprint"
    odom_frame_id: "odom"
    global_frame_id: "map"

    scan_topic: "scan"

    transform_tolerance: 1.0

    global_localization_sampling: false

    recovery_alpha_slow: 0.001
    recovery_alpha_fast: 0.1

    save_pose_rate: 0.5

    use_sim_time: true

    map_topic: "map"

    set_initial_pose: false
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0
